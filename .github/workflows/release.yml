name: Enterprise Release Pipeline

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Generate Semantic Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm Package Manager
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js Runtime environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Project Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter backend prisma:generate

      - name: Compile and Build Codebases
        run: pnpm build

      - name: Tar Build Artifacts
        run: |
          tar -czf backend-dist.tar.gz backend/dist backend/package.json
          tar -czf frontend-dist.tar.gz frontend/dist

      - name: Generate Release Notes
        id: release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const tags = await github.rest.repos.listTags({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const latestTag = context.ref.replace('refs/tags/', '');
            let previousTag = '';
            if (tags.data.length > 1) {
              previousTag = tags.data[1].name;
            }

            let changelog = `### Release ${latestTag}\n\n`;
            if (previousTag) {
              const commits = await github.rest.repos.compareCommitsWithBasehead({
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${previousTag}...${latestTag}`
              });
              changelog += "#### Commits in this Release:\n";
              for (const commit of commits.data.commits) {
                changelog += `- ${commit.commit.message.split('\n')[0]} (${commit.sha.substring(0, 7)})\n`;
              }
            } else {
              changelog += "Initial Release of the Platform.";
            }
            core.setOutput('changelog', changelog);

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.changelog }}
          draft: false
          prerelease: false

      - name: Upload Backend Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./backend-dist.tar.gz
          asset_name: backend-dist.tar.gz
          asset_content_type: application/gzip

      - name: Upload Frontend Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./frontend-dist.tar.gz
          asset_name: frontend-dist.tar.gz
          asset_content_type: application/gzip
