name: DevSecOps Security Scans

on:
  schedule:
    - cron: "0 0 * * 1" # Runs every Monday at midnight
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  sast-codeql:
    name: CodeQL Static Security Analysis (SAST)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL Analysis
        uses: github/codeql-action/init@v4
        with:
          languages: javascript, typescript

      - name: Setup pnpm Package Manager
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js Runtime environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Project Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter backend prisma:generate

      - name: Build project compiled JS
        run: pnpm build

      - name: Perform CodeQL Analysis Scan
        uses: github/codeql-action/analyze@v4

  dependency-vulnerabilities:
    name: Audit & Scans Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm Package Manager
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Audit Dependencies for Known Vulnerabilities
        run: pnpm audit --prod

      - name: Run TruffleHog OSS Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  license-compliance:
    name: License Compliance Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm Package Manager
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install license checker global tool
        run: npm install -g license-checker

      - name: Verify License Compliance
        run: |
          # Fails if any GPL/AGPL copyleft libraries are detected in production dependencies
          license-checker --production --failOn "GPL;AGPL;LGPL"
