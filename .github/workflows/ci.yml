name: Enterprise CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-typecheck-test:
    name: Lint, Type Check & Test Execution
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: indiwebpros_lms_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm Package Manager
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js Runtime environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Project Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Cache Prisma Client
        uses: actions/cache@v6
        with:
          path: |
            backend/src/generated/client
          key: ${{ runner.os }}-prisma-${{ hashFiles('backend/prisma/schema.prisma') }}

      - name: Generate Prisma Clients
        run: |
          pnpm --filter backend prisma:generate
          pnpm --filter tests prisma generate --schema=../backend/prisma/schema.prisma

      - name: Run Prisma Database Migrations
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/indiwebpros_lms_test?schema=public
        run: pnpm --filter backend prisma migrate deploy

      - name: Execute Code Linting Check (ESLint)
        run: pnpm lint

      - name: Execute Code Formatting Check (Prettier)
        run: pnpm format:check

      - name: Compile and Build Codebases (Type Check)
        run: pnpm build

      - name: Run Test Suite (Unit, Integration, API, Security)
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/indiwebpros_lms_test?schema=public
          JWT_SECRET: test_jwt_secret_key_123456_lms_observability
          JWT_REFRESH_SECRET: test_jwt_refresh_secret_key_123456_lms_observability
          AWS_REGION: us-east-1
          AWS_BUCKET: test-bucket
          AWS_ACCESS_KEY: mock_key
          AWS_SECRET_KEY: mock_secret
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          SMTP_USER: mock_user
          SMTP_PASSWORD: mock_password
        run: pnpm --filter tests test:coverage

      - name: Upload Code Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-coverage-report
          path: tests/coverage/
          retention-days: 14
