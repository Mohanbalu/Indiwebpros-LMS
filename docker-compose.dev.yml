version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: lms-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: indiwebpros_lms_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    networks:
      - lms-network-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d indiwebpros_lms_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lms-redis-dev
    ports:
      - "6379:6379"
    networks:
      - lms-network-dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: lms-backend-dev
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:password@db:5432/indiwebpros_lms_dev?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev_jwt_secret_key_123456
      - JWT_REFRESH_SECRET=dev_jwt_refresh_secret_key_123456
      - API_URL=http://localhost:5000/api/v1
      - AWS_ACCESS_KEY_ID=dummy
      - AWS_SECRET_ACCESS_KEY=dummy
      - AWS_REGION=us-east-1
      - S3_BUCKET=dummy
      - SMTP_HOST=localhost
      - SMTP_PORT=1025
    volumes:
      - .:/app
      - /app/node_modules
      - /app/backend/node_modules
      - /app/frontend/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lms-network-dev
    command: pnpm --filter backend dev

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: lms-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/frontend/node_modules
    networks:
      - lms-network-dev
    command: pnpm --filter frontend dev --host

volumes:
  pgdata-dev:

networks:
  lms-network-dev:
    driver: bridge
